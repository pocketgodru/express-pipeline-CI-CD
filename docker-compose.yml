services:
  app:
    image: pocketgod/express-app:latest
    container_name: my-express-app
    ports:
      - "8080:8080"
    restart: always

  watchtower:
    image: containrrr/watchtower
    environment:
      -  WATCHTOWER_POLL_INTERVAL=60 
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    container_name: watchtower